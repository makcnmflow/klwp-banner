<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>killwinparty dark beige</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #c5b358; 
            font-family: 'Verdana', sans-serif;
        }

        .marquee-wrapper {
            display: flex;
            flex-direction: column;
            transform: rotate(-12deg) scale(1.3); 
            user-select: none;
        }

        .row {
            display: flex;
            white-space: nowrap;
            font-size: 45px; 
            font-weight: 800;
            color: rgba(60, 50, 30, 0.5); 
            line-height: 1.4;
        }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .row span {
            display: inline-block;
            padding-right: 80px; 
            animation: scroll 35s linear infinite;
        }

        .row:nth-child(even) span {
            animation-direction: reverse;
            color: rgba(40, 30, 10, 0.4);
            animation-duration: 45s;
        }
    </style>
</head>
<body>

<div class="marquee-wrapper" id="wrapper"></div>

<script>
    const wrapper = document.getElementById('wrapper');
    const nick = "killwinparty ";
    const rowsCount = 25; 

    for (let i = 0; i < rowsCount; i++) {
        const row = document.createElement('div');
        row.className = 'row';
        const span = document.createElement('span');
        span.innerText = nick.repeat(10); 
        row.appendChild(span);
        wrapper.appendChild(row);
    }

    const spans = document.querySelectorAll('.row span');
    spans.forEach(span => {
        span.innerHTML += span.innerHTML; 
    });
</script>

</body>
</html>
